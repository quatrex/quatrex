include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

test-job:
  extends: .uenv-runner-daint-gh200
  image: prgenv-gnu/24.11:v1
  script: |
    gcc --version
    echo "Hello, World!"
  variables:
    WITH_UENV_VIEW: 'default'

test-job-multi:
  extends: .uenv-runner-daint-gh200
  image:  prgenv-gnu/24.11:v1
  script: |
    gcc --version
    module list
    echo "Hello, World!"
  variables:
    WITH_UENV_VIEW: 'modules'
    SLURM_JOB_NUM_NODES: 1
    SLURM_NTASKS: 4