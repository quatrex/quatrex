name: Run Basic Tests and Determine Code Coverage

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Prevents all tests from canceling if just one fails
      matrix:
        # Define your parallel jobs and their specific commands here
        include:
          - id: qttools-mpi
            name: QTTools MPI Tests
            cmd: NUMBA_DISABLE_JIT=1 mpiexec -np 3 coverage run --source=src --parallel-mode -m pytest -vv --only-mpi tests/qttools
          - id: quatrex-mpi
            name: QuaTrEx MPI Tests
            cmd: NUMBA_DISABLE_JIT=1 mpiexec -np 3 coverage run --source=src --parallel-mode -m pytest -vv --only-mpi tests/quatrex
          - id: numba-kernels
            name: NUMBA Tests (QTTools Kernels)
            cmd: coverage run --source=src --parallel-mode -m pytest -n 4 -vv tests/qttools/kernels
          - id: qttools
            name: QTTools Tests
            cmd: NUMBA_DISABLE_JIT=1 coverage run --source=src --parallel-mode -m pytest -n 4 -vv tests/qttools
          - id: quatrex
            name: QuaTrEx Tests
            cmd: coverage run --source=src --parallel-mode -m pytest -n 4 -vv tests/quatrex

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Git LFS Files
        run: git lfs pull

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.13"
          channels: conda-forge,defaults
          channel-priority: true
          activate-environment: quatrex-dev
          environment-file: environment-dev.yaml

      - name: Install quatrex without Dependencies
        run: pip install --no-deps --editable .

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.cmd }}

      # Upload the coverage file generated by this specific runner
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.id }}
          path: .coverage.*
          include-hidden-files: true # Required in v4 to upload dotfiles like .coverage

  coverage:
    # This ensures the coverage job waits for all parallel test jobs to finish
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.13"
          channels: conda-forge,defaults
          channel-priority: true
          activate-environment: quatrex-dev
          environment-file: environment-dev.yaml

      # Download all coverage artifacts from the parallel jobs
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true # Dumps all .coverage.* files into the same root directory

      - name: Combine Coverage and Report
        run: |
          coverage combine
          coverage report
          coverage xml
