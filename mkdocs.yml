site_name: quatrex
site_url: https://quatrex.github.io/quatrex/
site_description: Quantum transport simulations at the exascale and beyond.

repo_url: https://github.com/quatrex/quatrex

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: white
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: white
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Arimo
    code: Fira Code
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - content.code.copy


markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - toc:
      permalink: "#"
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_javascript:
  - javascript/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/custom.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          inventories:
          - https://docs.pydantic.dev/latest/objects.inv
          - https://docs.python.org/3/objects.inv
          - https://numpy.org/doc/stable/objects.inv
          - https://docs.scipy.org/doc/scipy/objects.inv
          - https://docs.cupy.dev/en/stable/objects.inv
  - mkapi
  # - mkdocs-jupyter:
  #     ignore_h1_titles: True

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
  - User Guide:
    - Overview: user_guide/index.md
    - Introduction: user_guide/introduction.md
    - Methodology: user_guide/methodology.md
    - Examples:
      - Carbon Nanotube: user_guide/examples/cnt.md
    # - Parameters: user_guide/introduction.md
  - Contributing: contributing/index.md
  - API Reference:
    - Overview: api/index.md
    - $api:src/qttools.***
    - $api:src/quatrex.***
