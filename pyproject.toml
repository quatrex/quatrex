[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "quatrex"
authors = [
    { name = "Alexander Maeder", email = "almaeder@iis.ee.ethz.ch" },
    { name = "Alexandros Nikolaos Ziogas", email = "alziogas@iis.ee.ethz.ch" },
    { name = "Anders Winka", email = "awinka@iis.ee.ethz.ch" },
    { name = "Jiang Cao", email = "jiang.cao@iis.ee.ethz.ch" },
    { name = "Leonard Deuschle", email = "dleonard@iis.ee.ethz.ch" },
    { name = "Mathieu Luisier", email = "mluisier@iis.ee.ethz.ch" },
    { name = "Mauro Dossena", email = "mdossena@iis.ee.ethz.ch" },
    { name = "Nicolas Vetsch", email = "vetschn@iis.ee.ethz.ch" },
    { name = "Vincent Maillou", email = "vmaillou@iis.ee.ethz.ch" },
]
description = "Quantum Transport Simulations at the Exascale and Beyond"
license = { file = "LICENSE" }
classifiers = [
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Topic :: Scientific/Engineering",
]
keywords = ["Nano-TCAD", "Quantum Transport", "NEGF"]
dynamic = ["version"]
requires-python = ">=3.13"
dependencies = [
    "numpy>=1.23.2",
    "scipy",
    "numba",
    "mpi4py",
    "pydantic",
    "matplotlib",
    "threadpoolctl",
    "typer",
]
    [project.optional-dependencies]
    gpu = ["cupy==13.2.0"]
    dev = [
        "pytest",
        "pytest-cov",
        "pytest-mpi",
        "pytest-xdist",
        "coverage",
        "black",
        "blacken-docs",
        "isort",
        "ruff",
        "just",
    ]
    docs = [
        "mkdocs",
        "mkdocs-material",
        "griffe-pydantic",
        "mkdocs-gen-files",
        "tabulate",
        "mkapi",
        "mpich",  # If not present, mkapi cannot build the api docs.
    ]
    'linting': ["pre-commit"]

    [project.urls]
    Code = "https://github.com/quatrex/quatrex"

[project.scripts]
quatrex = "quatrex.cli:run_cli"

[tool.setuptools.dynamic]
version = { attr = "quatrex.__about__.__version__" }

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
testpaths = ["tests"]

[tool.isort]
profile = "black"
