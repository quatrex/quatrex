simulation_dir = "."

[scba] # =============================================================
max_iterations = 15
mixing_factor = 0.5

coulomb_screening = true

[outputs] # ==========================================================
electron_ldos = true


[electron] # =========================================================
number_of_kpoints = [1, 3, 1]

left_fermi_level = -1.1  # eV
right_fermi_level = -1.1 # eV

fermi_level = -1.1 # eV
conduction_band_edge = -0.3187 # eV
valence_band_edge = -2.0026 # eV

band_edge_tracking = "eigenvalues"

solver.algorithm = "rgf"
solver.max_batch_size = 1000
solver.compute_current = true # Compute Meir-Wingreen current.

obc.algorithm = "spectral"
obc.nevp_solver = "beyn"
obc.block_sections = 1

# Parameters for Beyn's method.
obc.num_ref_iterations = 3
obc.max_decay = 15
obc.min_decay = 1e-3
obc.r_o = 10
obc.r_i = 0.8
obc.m_0 = 31
obc.num_quad_points = 31

[coulomb_screening] # ===============================================
interaction_cutoff = 8 # Å

relative_permittivity = 5.0

num_connected_blocks = "auto" # Can be 1, 2, 3, or "auto"

solver.algorithm = "rgf"
solver.max_batch_size = 1000

obc.algorithm = "spectral"
obc.nevp_solver = "beyn"
obc.block_sections = 2

# Parameters for Beyn's method.
obc.num_ref_iterations = 3
obc.max_decay = 15
obc.min_decay = 1e-3
obc.r_o = 10
obc.r_i = 0.8
obc.m_0 = 32
obc.num_quad_points = 31

lyapunov.algorithm = "spectral"
